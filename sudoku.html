<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUDOKU | COMPACT</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ccff00; --bg: #0a0a0a; --panel: #111; --error: #ff003c; --hint: #00f2ff; --text: #eee; }
        
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        
        body {
            background: var(--bg); color: var(--text); font-family: 'Orbitron', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle, #222 0%, #0a0a0a 100%);
            overflow: hidden; /* Запрещаем скролл самого окна */
        }

        /* --- MENU --- */
        #main-menu {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo { font-family: 'Permanent Marker'; font-size: 4rem; color: var(--neon); text-shadow: 4px 4px 0 #000; margin-bottom: 20px; }
        .menu-card { background: var(--panel); padding: 20px; border: 2px solid #333; width: 300px; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 20px; }
        
        .opt-btn { 
            background: #1a1a1a; border: 1px solid #444; color: #666; padding: 8px; 
            font-family: 'Permanent Marker'; cursor: pointer; font-size: 0.8rem;
        }
        .opt-btn.active { border-color: var(--neon); color: var(--neon); }

        .start-btn { 
            width: 100%; padding: 12px; background: var(--neon); color: #000; border: none; 
            font-family: 'Permanent Marker'; font-size: 1.5rem; cursor: pointer; 
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        /* --- GAME WRAPPER (ГЛАВНЫЙ КОНТЕЙНЕР) --- */
        #game-ui { 
            display: none; flex-direction: column; align-items: center; 
            width: 95vw; max-width: 380px; /* Еще компактнее */
            max-height: 98vh; /* Не дает вылезать за высоту экрана */
        }

        .stats-top { 
            display: flex; justify-content: space-between; width: 100%; 
            margin-bottom: 8px; color: var(--neon); font-size: 0.9rem;
        }
        .stats-top span { font-family: 'Permanent Marker'; color: #fff; }

        /* СЕТКА СУДОКУ */
        .board { 
            display: grid; grid-template-columns: repeat(9, 1fr); 
            width: 100%; aspect-ratio: 1/1; 
            background: #444; padding: 2px; border: 3px solid #222; 
        }

        .cell { 
            background: var(--bg); border: 0.5px solid #1a1a1a; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; cursor: pointer;
        }
        .cell.fixed { color: #555; font-family: 'Permanent Marker'; background: #0e0e0e; }
        .cell.selected { background: #1a1a1a; box-shadow: inset 0 0 5px var(--neon); color: var(--neon); }
        .cell.invalid { color: var(--error); }
        .cell.hinted { color: var(--hint); font-style: italic; }

        /* Визуальные границы блоков 3x3 */
        .cell:nth-child(3n) { border-right: 2px solid #555; }
        .cell:nth-child(9n) { border-right: 0.5px solid #1a1a1a; }
        .b-bottom { border-bottom: 2px solid #555; }

        /* КНОПКИ ЦИФР */
        .numpad { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 5px; width: 100%; margin-top: 10px; 
        }
        .n-btn { 
            height: 40px; border: 1px solid #333; background: var(--panel); 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Permanent Marker'; font-size: 1.1rem; cursor: pointer; 
        }
        .n-btn:hover { border-color: var(--neon); color: var(--neon); }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .controls { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; 
            gap: 5px; width: 100%; margin-top: 10px; 
        }
        .ctrl-btn {
            font-family: 'Permanent Marker'; font-size: 0.75rem; padding: 10px 2px;
            background: #1a1a1a; border: 1px solid #444; color: #fff; cursor: pointer;
        }
        
        /* МОДАЛКА */
        #modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="logo">SUDOKU</div>
        <div class="menu-card">
            <div class="btn-group">
                <button class="opt-btn active" onclick="setDiff('easy', this)">EASY</button>
                <button class="opt-btn" onclick="setDiff('medium', this)">MID</button>
                <button class="opt-btn" onclick="setDiff('hard', this)">HARD</button>
            </div>
            <button class="start-btn" onclick="startGame()">BURN</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="stats-top">
            <div>CASH: <span id="s-val">0</span></div>
            <div>ACC: <span id="a-val">0%</span></div>
        </div>
        
        <div id="board" class="board"></div>
        
        <div class="numpad" id="pad"></div>
        
        <div class="controls">
            <button class="ctrl-btn" id="h-btn" style="color:var(--hint)" onclick="useHint()">HINT: 3</button>
            <button class="ctrl-btn" style="color:var(--neon)" onclick="finishGame()">FINISH</button>
            <button class="ctrl-btn" style="color:var(--error)" onclick="location.reload()">QUIT</button>
        </div>
    </div>

    <div id="modal">
        <h1 id="m-title" style="font-family:'Permanent Marker'; font-size:3rem; margin-bottom:10px;"></h1>
        <p id="m-info" style="font-size:1.2rem; color:#888; margin-bottom:20px; text-align:center"></p>
        <button class="start-btn" style="width:200px" onclick="location.reload()">AGAIN</button>
    </div>

    <script>
        let g = { diff: 'easy', score: 0, free: 3, empty: 0, right: 0, selected: null, board: [], sol: [] };

        const PATTERN = [
            5,3,4,6,7,8,9,1,2, 6,7,2,1,9,5,3,4,8, 1,9,8,3,4,2,5,6,7,
            8,5,9,7,6,1,4,2,3, 4,2,6,8,5,3,7,9,1, 7,1,3,9,2,4,8,5,6,
            9,6,1,5,3,7,2,8,4, 2,8,7,4,1,9,6,3,5, 3,4,5,2,8,6,1,7,9
        ];

        function setDiff(d, b) {
            g.diff = d;
            document.querySelectorAll('.opt-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            
            const map = {};
            const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
            [1,2,3,4,5,6,7,8,9].forEach((n, i) => map[n] = nums[i]);
            g.sol = PATTERN.map(n => map[n]);

            let chance = g.diff === 'easy' ? 0.55 : (g.diff === 'medium' ? 0.38 : 0.25);
            g.board = g.sol.map(s => {
                let show = Math.random() < chance;
                return { sol: s, val: show ? s : 0, fixed: show, hinted: false };
            });

            g.empty = g.board.filter(c => !c.fixed).length;
            g.right = 0; g.score = 0; g.free = 3; g.selected = null;
            
            renderBoard(); renderPad(); updateUI();
        }

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            g.board.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = 'cell';
                if (Math.floor(i/9) === 2 || Math.floor(i/9) === 5) d.classList.add('b-bottom');
                if (c.fixed) { d.innerText = c.val; d.classList.add('fixed'); }
                else {
                    if (c.val !== 0) {
                        d.innerText = c.val;
                        if (c.val !== c.sol) d.classList.add('invalid');
                        if (c.hinted) d.classList.add('hinted');
                    }
                    d.onclick = () => { g.selected = i; renderBoard(); };
                }
                if (g.selected === i) d.classList.add('selected');
                b.appendChild(d);
            });
        }

        function renderPad() {
            const p = document.getElementById('pad'); p.innerHTML = '';
            for(let i=1; i<=9; i++) {
                let b = document.createElement('div'); b.className = 'n-btn'; b.innerText = i;
                b.onclick = () => input(i); p.appendChild(b);
            }
            let del = document.createElement('div'); del.className = 'n-btn'; del.innerText = 'DEL';
            del.style.color = 'var(--error)'; del.style.fontSize = '0.7rem'; del.onclick = () => input(0); p.appendChild(del);
        }

        function input(n) {
            if (g.selected === null || g.board[g.selected].fixed) return;
            let cell = g.board[g.selected];
            if (n !== 0) {
                if (n === cell.sol) { if (cell.val !== cell.sol) { g.score += 25; g.right++; } }
                else { if (cell.val === cell.sol) g.right--; g.score = Math.max(0, g.score - 10); }
            } else if (cell.val === cell.sol) { g.right--; }
            cell.val = n; cell.hinted = false; updateUI(); renderBoard();
        }

        function useHint() {
            if (g.selected === null || g.board[g.selected].fixed || g.board[g.selected].val === g.board[g.selected].sol) return;
            if (g.free > 0) { g.free--; applyHint(); }
            else if (g.score >= 50) { g.score -= 50; applyHint(); }
            else return;
            updateUI(); renderBoard();
        }

        function applyHint() { let c = g.board[g.selected]; c.val = c.sol; c.hinted = true; g.right++; }

        function updateUI() {
            document.getElementById('s-val').innerText = g.score;
            let acc = Math.round((g.right / g.empty) * 100);
            document.getElementById('a-val').innerText = Math.min(100, Math.max(0, acc)) + '%';
            document.getElementById('h-btn').innerText = g.free > 0 ? `FREE: ${g.free}` : `HINT: -50`;
        }

        function finishGame() {
            const win = g.board.every(c => c.val === c.sol);
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('m-title').innerText = win ? "RESPECT" : "BUSTED";
            document.getElementById('m-title').style.color = win ? "var(--neon)" : "var(--error)";
            document.getElementById('m-info').innerHTML = `CASH: ${g.score} <br> ACCURACY: ${document.getElementById('a-val').innerText}`;
        }

        document.onkeydown = (e) => {
            if (e.key >= 1 && e.key <= 9) input(parseInt(e.key));
            if (e.key === 'Backspace' || e.key === 'Delete') input(0);
        };
    </script>
</body>
</html>
