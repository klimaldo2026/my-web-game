<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREET POP TETRIS - ULTIMATE EDITION</title>
    <style>
        /* ИМПОРТ ДЕРЗКИХ ШРИФТОВ */
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto+Black&display=swap');

        :root {
            --neon-lime: #ccff00;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-orange: #ff3e00;
            --bg-dark: #0a0a0a;
            --border-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(var(--neon-pink) 1px, transparent 1px),
                radial-gradient(var(--neon-blue) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #fff;
            font-family: 'Roboto Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #main-menu {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s ease;
        }

        .logo-container {
            position: relative;
            margin-bottom: 60px;
            transform: rotate(-3deg);
        }

        .logo-main {
            font-family: 'Permanent Marker', cursive;
            font-size: 7rem;
            color: var(--neon-lime);
            text-shadow: 12px 12px 0px var(--neon-pink);
            line-height: 1;
            margin: 0;
        }

        .logo-sub {
            position: absolute;
            bottom: -20px;
            right: -10px;
            background: var(--neon-blue);
            color: #000;
            padding: 5px 15px;
            font-size: 1.5rem;
            transform: rotate(5deg);
        }

        /* --- КНОПКИ --- */
        .btn-pop {
            padding: 20px 60px;
            font-family: 'Permanent Marker', cursive;
            font-size: 2.5rem;
            background: var(--neon-lime);
            border: 6px solid var(--border-white);
            color: #000;
            cursor: pointer;
            box-shadow: 10px 10px 0px var(--neon-blue);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            outline: none;
        }

        .btn-pop:hover {
            transform: scale(1.1) rotate(2deg);
            background: var(--border-white);
            box-shadow: 15px 15px 0px var(--neon-pink);
        }

        .btn-pop:active {
            transform: scale(0.95);
            box-shadow: 4px 4px 0px var(--neon-blue);
        }

        /* --- ИГРОВОЙ ИНТЕРФЕЙС --- */
        #game-screen {
            display: none;
            position: relative;
            flex-direction: column;
            align-items: center;
        }

        .game-header {
            font-family: 'Permanent Marker', cursive;
            font-size: 4rem;
            color: var(--neon-lime);
            text-shadow: 6px 6px 0px var(--neon-pink);
            margin: 0 0 15px 0;
            letter-spacing: 5px;
        }

        #canvas-wrapper {
            position: relative;
            border: 12px solid var(--border-white);
            box-shadow: 20px 20px 0px var(--neon-pink), -10px -10px 0px var(--neon-blue);
            background: #000;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .side-hud {
            position: absolute;
            left: calc(100% + 40px);
            top: 0;
            width: 180px;
            text-align: left;
        }

        .stat-card {
            background: rgba(0,0,0,0.8);
            border: 4px solid var(--neon-blue);
            padding: 15px;
            margin-bottom: 20px;
            transform: skew(-5deg);
        }

        .stat-label {
            font-family: 'Permanent Marker';
            color: var(--neon-blue);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2.5rem;
            color: #fff;
            font-weight: 900;
        }

        .btn-back {
            background: var(--neon-orange);
            font-size: 1.5rem;
            padding: 10px 20px;
            box-shadow: 6px 6px 0px #fff;
            margin-top: 20px;
        }

        /* --- ЭКРАН ПРОИГРЫША --- */
        #death-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 0, 255, 0.3);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border: 4px solid #fff;
        }

        .wasted-title {
            font-family: 'Permanent Marker';
            font-size: 5rem;
            color: #fff;
            text-shadow: 6px 6px 0px #000;
            margin: 0;
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        .final-score-box {
            background: #000;
            color: var(--neon-lime);
            font-family: 'Permanent Marker';
            font-size: 2.2rem;
            padding: 15px 40px;
            margin: 30px 0;
            border: 5px solid var(--neon-blue);
            transform: rotate(-2deg);
        }

        /* --- ПОДСКАЗКИ --- */
        .controls-info {
            position: fixed;
            bottom: 20px;
            font-family: 'Permanent Marker';
            color: var(--neon-blue);
            font-size: 1.1rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
        }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="logo-container">
            <h1 class="logo-main">TETRIS</h1>
            <div class="logo-sub">STREET POP</div>
        </div>
        <button class="btn-pop" onclick="handleStart()">ИГРАТЬ</button>
    </div>

    <div id="game-screen">
        <h1 class="game-header">TETRIS</h1>
        
        <div id="canvas-wrapper">
            <canvas id="tetris" width="240" height="400"></canvas>
            
            <div id="death-overlay">
                <h2 class="wasted-title">WASTED</h2>
                <div class="final-score-box">
                    SCORE: <span id="death-score-val">0</span>
                </div>
                <button class="btn-pop" style="font-size: 1.8rem;" onclick="handleRestart()">ИГРАТЬ ЗАНОВО</button>
            </div>
        </div>

        <div class="side-hud">
            <div class="stat-card">
                <div class="stat-label">SCORE</div>
                <div id="score-val" class="stat-value">0</div>
            </div>
            <button class="btn-pop btn-back" onclick="handleBack()">МЕНЮ</button>
        </div>
    </div>

    <div class="controls-info">УПРАВЛЕНИЕ: СТРЕЛКИ ИЛИ WASD (ЦФЫВ)</div>

    <script>
        /**
         * ГЛОБАЛЬНЫЕ НАСТРОЙКИ
         */
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        const PIECE_COLORS = [
            null,
            '#ff00ff', // Розовый
            '#00ffff', // Голубой
            '#ccff00', // Лимон
            '#ff3e00', // Оранж
            '#7000ff', // Фиолет
            '#ffffff', // Белый
            '#ffde17', // Желтый
        ];

        let arena = createMatrix(12, 20);
        let player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0
        };

        let dropCounter = 0;
        let dropInterval = 280; // Твоя скорость
        let lastTime = 0;
        let isPaused = true;
        let isGameOver = false;

        /**
         * ФУНКЦИИ ЯДРА ИГРЫ
         */
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            const pieces = {
                'I': [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]],
                'L': [[0, 2, 0], [0, 2, 0], [0, 2, 2]],
                'J': [[0, 3, 0], [0, 3, 0], [3, 3, 0]],
                'O': [[4, 4], [4, 4]],
                'Z': [[5, 5, 0], [0, 5, 5], [0, 0, 0]],
                'S': [[0, 6, 6], [6, 6, 0], [0, 0, 0]],
                'T': [[0, 7, 0], [7, 7, 7], [0, 0, 0]],
            };
            return pieces[type];
        }

        function draw() {
            // Очистка
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // Отрисовка поля и игрока
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Тело блока
                        context.fillStyle = PIECE_COLORS[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Черный контур поп-арт
                        context.lineWidth = 0.08;
                        context.strokeStyle = '#000';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Блик сверху
                        context.fillStyle = 'rgba(255,255,255,0.2)';
                        context.fillRect(x + offset.x + 0.1, y + offset.y + 0.1, 0.3, 0.3);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function arenaSweep() {
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                // Линия полная!
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                // ДОБАВЛЯЕМ +100 ОЧКОВ
                player.score += 100;
            }
            updateScoreUI();
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            if (isGameOver || isPaused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                
                // Проверка на проигрыш (если застряли в самом верху)
                if (player.pos.y <= 0) {
                    triggerWasted();
                    return;
                }
                
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (isGameOver || isPaused) return;
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            if (isGameOver || isPaused) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                triggerWasted();
            }
        }

        /**
         * ИНТЕРФЕЙС И СОСТОЯНИЯ
         */
        function updateScoreUI() {
            document.getElementById('score-val').innerText = player.score;
        }

        function triggerWasted() {
            isGameOver = true;
            document.getElementById('death-score-val').innerText = player.score;
            document.getElementById('death-overlay').style.display = 'flex';
        }

        function handleStart() {
            document.getElementById('main-menu').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                isPaused = false;
                handleRestart();
            }, 400);
        }

        function handleRestart() {
            arena = createMatrix(12, 20);
            player.score = 0;
            isGameOver = false;
            document.getElementById('death-overlay').style.display = 'none';
            updateScoreUI();
            playerReset();
        }

        function handleBack() {
            isPaused = true;
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('main-menu').style.opacity = '1';
            document.getElementById('game-screen').style.display = 'none';
        }

        /**
         * УПРАВЛЕНИЕ (WASD + СТРЕЛКИ)
         */
        document.addEventListener('keydown', e => {
            const code = e.code;
            // Влево
            if (code === 'ArrowLeft' || code === 'KeyA') playerMove(-1);
            // Вправо
            else if (code === 'ArrowRight' || code === 'KeyD') playerMove(1);
            // Вниз
            else if (code === 'ArrowDown' || code === 'KeyS') playerDrop();
            // Поворот
            else if (code === 'ArrowUp' || code === 'KeyW') playerRotate(1);
        });

        /**
         * ИГРОВОЙ ЦИКЛ
         */
        function update(time = 0) {
            if (!isPaused && !isGameOver) {
                const deltaTime = time - lastTime;
                lastTime = time;

                dropCounter += deltaTime;
                if (dropCounter > dropInterval) {
                    playerDrop();
                }
                draw();
            }
            requestAnimationFrame(update);
        }

        // Запуск анимационного цикла
        update();
    </script>
</body>
</html>
